quarkus.http.test-port=8888
quarkus.http.host=0.0.0.0
quarkus.log.category."com.vaadin.quarkus.push".level=DEBUG

# Force a single Vert.x event loop. With multiple loops, the collision between
# Push onConnect and the REST client call is probabilistic; pinning to one is
# what makes this scenario reproducible.
quarkus.vertx.event-loops-pool-size=1

# Same-app REST client target. The reactive Quarkus REST client runs on the
# Vert.x event loop, so its request and response delivery both depend on the
# single loop above. The ${quarkus.http.port:8080} placeholder resolves to 8080
# in dev mode (`mvn quarkus:dev`) and to quarkus.http.test-port when run as a
# @QuarkusIntegrationTest, so the same config works for both.
quarkus.rest-client.slow-greeting.url=http://localhost:${quarkus.http.port:8080}

# uncomment to reproduce the failure
#quarkus.websocket.dispatch-to-worker=false


