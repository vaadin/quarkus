# Default Quarkus websocket frame dispatch to the worker thread pool. Vaadin
# Push acquires the session lock before dispatching, and application code is
# free to block while holding that lock (e.g. synchronous REST calls or
# database operations inside BeforeEnterObserver or AfterNavigationListener).
# With the Quarkus default (false), that blocking happens on the Vert.x event
# loop and may cause the application to hang. See README.md for details.
quarkus.websocket.dispatch-to-worker=true
